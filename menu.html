<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="only light" />
<meta name="theme-color" content="#e2c47f" />
<title>Menú · The Wizard Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Pirata+One&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  color-scheme:only light;
  --bg:#d8bb7b;--surface:rgba(255,244,204,.48);--surface2:rgba(83,55,26,.12);
  --border:#9a7443;--border2:#6c4b27;
  --text:#2c1b0e;--muted:#65492c;--hint:#8a6b47;
  --gold:#6f481e;--gold-dim:rgba(111,72,30,.12);
  --green:#2a9d5c;--green-bg:rgba(42,157,92,.15);
  --red:#c0392b;--red-bg:rgba(192,57,43,.15);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;color-scheme:only light;background:#d8b873 url("parchment-bg.jpg") center top/720px auto repeat-y}
body{font-family:"Lora",serif;background:#e2c47f url("parchment-bg.jpg") center top/100% auto repeat-y;color:var(--text);min-height:100vh;max-width:520px;margin:0 auto;position:relative;box-shadow:0 0 80px rgba(0,0,0,.8);forced-color-adjust:none}

/* Top bar */
.top-bar{background:#e7ca86 url("parchment-bg.jpg") center 8%/100% auto no-repeat;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;height:70px;border-bottom:1px solid var(--border2);position:relative;z-index:30;box-shadow:inset 0 -5px 14px rgba(80,48,20,.1)}
.top-logo{display:flex;align-items:center;gap:11px}
.top-logo img{width:42px;height:42px;object-fit:contain;border-radius:50%;filter:sepia(.25) contrast(1.1)}
.top-logo-text{display:flex;flex-direction:column}
.top-logo-name{font-family:"Pirata One",serif;font-size:27px;font-weight:400;letter-spacing:.02em;color:#3b230f;line-height:.9}
.top-logo-sub{font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:5px}
.top-ig{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text);text-decoration:none;transition:border-color .2s,color .2s;background:#ecd59b}
.top-ig:hover{border-color:var(--gold);color:var(--gold)}
.top-ig svg{width:18px;height:18px}

/* Hero banner */
.hero{position:relative;width:100%;height:72vw;max-height:390px;min-height:275px;overflow:hidden;background:#080706}
.banner-track{display:flex;height:100%;transition:transform .65s cubic-bezier(.4,0,.2,1)}
.banner-slide{min-width:100%;height:100%;flex-shrink:0;position:relative}
.banner-slide img{width:100%;height:100%;object-fit:cover;filter:saturate(.9) contrast(1.03)}
.banner-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.04) 20%,rgba(0,0,0,.3) 55%,rgba(0,0,0,.94) 100%);pointer-events:none}
.banner-text{position:absolute;bottom:0;left:0;right:0;padding:28px 24px 30px;text-align:center}
.banner-text-title{font-family:"Pirata One",serif;font-size:clamp(2.2rem,9vw,3.2rem);font-weight:400;line-height:1;color:#f3ddb0;margin-bottom:8px;text-shadow:0 2px 10px #000,0 0 2px #000}
.banner-text-sub{max-width:380px;margin:0 auto;font-size:13px;color:#fff1cf;line-height:1.45;text-shadow:0 1px 8px #000}
.hero-fallback{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(160deg,#1a1612,#0d0b09)}
.hero-fallback-title{font-size:2.5rem;font-weight:500;color:var(--gold)}
.hero-fallback-sub{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}

/* Banner controls strip */
.banner-controls{background:#dfbf79 url("parchment-bg.jpg") center 13%/100% auto no-repeat;border-bottom:1px solid var(--border2);display:flex;align-items:stretch;padding:0 10px;height:46px;box-shadow:inset 0 -4px 10px rgba(92,55,22,.12)}
.banner-tabs{display:flex;align-items:stretch;flex:1;overflow-x:auto;scrollbar-width:none}
.banner-tabs::-webkit-scrollbar{display:none}
.banner-tab{flex:1 0 33.333%;min-width:110px;position:relative;background:none;border:none;color:#5e3c1d;font-family:"Pirata One",serif;font-size:21px;font-weight:400;cursor:pointer;padding:0 10px;transition:color .2s;white-space:nowrap}
.banner-tab::after{content:"";position:absolute;left:14px;right:14px;bottom:0;height:2px;border-radius:2px;background:transparent;transition:background .2s}
.banner-tab.active{color:#241307}
.banner-tab.active::after{background:#5d3515}
.banner-tab:hover:not(.active){color:var(--text)}

/* Menu categories */
.nav-wrap{background:#e1c17b url("parchment-bg.jpg") center 25%/100% auto no-repeat;padding:15px 17px 13px;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:20;box-shadow:0 4px 14px rgba(65,38,15,.16)}
.nav-heading{font-family:"Pirata One",serif;font-size:26px;font-weight:400;line-height:1;margin-bottom:11px;color:#35200f}
.nav-scroll{display:flex;gap:8px;overflow-x:auto;padding:0;scrollbar-width:none}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:6px 13px;font-size:11px;font-weight:600;color:#694724;border:1px solid transparent;border-radius:999px;background:none;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:#2d190b;border-color:#6d451e;background:#f0d99f}

/* Main */
main{padding:0 0 5rem;background:#dfc080 url("parchment-bg.jpg") center top/100% auto repeat-y}
.cat-section{padding:14px 17px 2px}
.cat-title{display:none}

/* Item */
.item{background:#efdaa4 url("parchment-bg.jpg") center 45%/145% auto no-repeat;border:1px solid #9c7546;border-radius:14px;overflow:hidden;display:flex;margin-bottom:10px;min-height:112px;transition:border-color .2s,transform .2s;box-shadow:inset 0 0 18px rgba(255,249,222,.35),0 2px 4px rgba(76,45,17,.08)}
.item:hover{border-color:var(--border2)}
.item.agotado{opacity:.5}
.item-img{width:38%;max-width:160px;flex-shrink:0;background:#d5b878 url("parchment-bg.jpg") center 72%/180% auto no-repeat;overflow:hidden;position:relative;border-right:1px solid #a27b49}
.item-img img{width:100%;height:100%;object-fit:cover;display:block;min-height:112px}
.item-img-ph{width:100%;height:100%;min-height:112px;display:flex;align-items:center;justify-content:center;color:var(--hint)}
.item-img-ph svg{width:24px;height:24px;opacity:.3}
.item-body{flex:1;padding:11px 12px 10px;display:flex;flex-direction:column;gap:4px;min-width:0}
.item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.item-name{font-family:"Pirata One",serif;font-size:21px;font-weight:400;color:#301b0c;line-height:1.05;flex:1}
.item-veg{font-size:13px;flex-shrink:0;margin-top:-1px;color:var(--gold)}
.item-rec{display:inline-flex;align-items:center;gap:4px;background:#67421e;border:1px solid #513015;border-radius:20px;padding:2px 7px;font-size:9px;font-weight:500;color:#f6e4b8;letter-spacing:.02em;align-self:flex-start;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.item-rec svg{width:10px;height:10px;flex-shrink:0}
.item-desc{font-size:11px;color:#5a3b20;line-height:1.35;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:auto}
.item-price{font-family:"Pirata One",serif;font-size:19px;font-weight:400;color:#381e0c;white-space:nowrap;margin-left:auto}
.item-tag{font-size:8px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:20px}
.item-tag.in{display:none}
.item-tag.out{background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.15)}

/* Loader */
.page-loader{display:flex;align-items:center;justify-content:center;padding:5rem 2rem;gap:10px;color:var(--muted);font-size:13px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:4rem 2rem;color:var(--hint)}
.empty p{font-size:13px;line-height:1.6}

/* Footer */
footer{text-align:center;padding:2rem 1rem 3rem;font-size:11px;color:#6d4b2a;border-top:1px solid var(--border);background:#d8b875 url("parchment-bg.jpg") center bottom/100% auto no-repeat}
footer strong{color:var(--muted)}
@media(max-width:370px){
  .top-bar{padding-left:14px;padding-right:14px}
  .top-logo-name{font-size:15px}
  .banner-tab{min-width:100px;padding:0 9px;font-size:13px}
  .item-img{width:35%}
  .item-name{font-size:14px}
}
@media(max-width:520px){
  html,body{background-image:url("parchment-bg.jpg")!important}
  body{box-shadow:none;background-color:#dfbf79}
  .top-bar,.banner-controls,.nav-wrap,main,footer{background-attachment:scroll}
  .top-bar,.banner-controls,.nav-wrap,main,.item,.item-img,footer{background-image:url("parchment-bg.jpg")!important}
  .item{background-color:#f1dda9}
}
@supports(padding-bottom:env(safe-area-inset-bottom)){body{padding-bottom:env(safe-area-inset-bottom)}}
</style>
</head>

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3YXR4cHV4dHRnZWNlYWhiY2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MjkyMDYsImV4cCI6MjA5NjIwNTIwNn0.qDucNfJDg5MF2nv63w9HUcjYjFitxlJOQq9OL6NsoHw";

let categories=[],products=[],banners=[];
let bannerIdx=0,bannerTimer=null,autoplay=false;
let activeTab="__all__";

async function sbFetch(path){
  const res=await fetch(SUPABASE_URL+"/rest/v1/"+path,{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
  return res.json();
}

async function loadAll(){
  try{
    const [cats,prods,bans]=await Promise.all([
      sbFetch("categories?select=*&order=position"),
      sbFetch("products?select=*&order=position"),
      sbFetch("banners?select=*&order=position")
    ]);
    categories=cats||[];products=prods||[];banners=bans||[];
    initBanner();renderNav();renderContent();
  }catch(e){
    document.getElementById("main-content").innerHTML='<div class="empty"><p>Error al cargar.<br/>Recarga la página.</p></div>';
  }
}

/* Banner */
function initBanner(){
  const track=document.getElementById("banner-track");
  const fallback=document.getElementById("hero-fallback");
  const controls=document.getElementById("banner-controls");
  if(!banners.length){fallback.style.display="flex";controls.style.display="none";return;}
  fallback.style.display="none";
  track.innerHTML=banners.map(b=>`<div class="banner-slide"><img src="${b.img_url}" loading="lazy"/></div>`).join("");
  document.getElementById("banner-gradient").style.display="block";
  controls.style.display=banners.length>1?"flex":"none";
  renderBannerTabs();
  showBannerSlide(0);
  if(autoplay)startAuto();
}

function renderBannerTabs(){
  const tabs=document.getElementById("banner-tabs");
  tabs.innerHTML=banners.map((b,i)=>{
    const label=b.title||(i===0?"Promo 1":i===1?"Promo 2":i===2?"Promo 3":"Slide "+(i+1));
    return `<button class="banner-tab${i===bannerIdx?" active":""}" onclick="bannerGo(${i},true)">${esc(label)}</button>`;
  }).join("");
}

function showBannerSlide(idx){
  bannerIdx=idx;
  document.getElementById("banner-track").style.transform=`translateX(-${idx*100}%)`;
  document.querySelectorAll(".banner-tab").forEach((t,i)=>t.classList.toggle("active",i===idx));
  const b=banners[idx];
  const titleEl=document.getElementById("banner-title");
  const subEl=document.getElementById("banner-sub");
  const textWrap=document.getElementById("banner-text");
  if(b&&(b.title||b.subtitle)){
    titleEl.textContent=b.title||"";
    subEl.textContent=b.subtitle||"";
    subEl.style.display=b.subtitle?"block":"none";
    textWrap.style.display="block";
  }else{textWrap.style.display="none";}
}

function bannerGo(idx,manual){
  showBannerSlide(idx);
  if(manual){clearInterval(bannerTimer);if(autoplay)startAuto();}
}

function startAuto(){
  clearInterval(bannerTimer);
  if(!autoplay||banners.length<2)return;
  bannerTimer=setInterval(()=>showBannerSlide((bannerIdx+1)%banners.length),4500);
}

function toggleAutoplay(){
  autoplay=!autoplay;
  if(autoplay)startAuto();else clearInterval(bannerTimer);
}

/* Nav */
function catsWithProducts(){return categories.filter(c=>products.some(p=>p.cat===c.name));}

function renderNav(){
  const cats=catsWithProducts();
  let html=`<button class="nav-tab${activeTab==="__all__"?" active":""}" onclick="setTab('__all__')">Todo</button>`;
  cats.forEach(c=>{html+=`<button class="nav-tab${activeTab===c.name?" active":""}" onclick="setTab('${esc(c.name)}')">${esc(c.name)}</button>`;});
  document.getElementById("nav-tabs").innerHTML=html;
}

function setTab(name){activeTab=name;renderNav();renderContent();}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* Content */
function renderContent(){
  const main=document.getElementById("main-content");
  const cats=activeTab==="__all__"?catsWithProducts():categories.filter(c=>c.name===activeTab);
  let html="";
  cats.forEach(cat=>{
    const prods=products.filter(p=>p.cat===cat.name);
    if(!prods.length)return;
    html+=`<div class="cat-section"><div class="cat-title">${esc(cat.name)}</div>`;
    prods.forEach((p,i)=>{
      html+=`<div class="item${p.stock?"":" agotado"}" style="animation-delay:${i*.04}s">
        <div class="item-img">
          ${p.img_url?`<img src="${p.img_url}" alt="${esc(p.name)}" loading="lazy"/>`:`<div class="item-img-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></div>`}
        </div>
        <div class="item-body">
          ${p.recommendation?`<span class="item-rec"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>${esc(p.recommendation)}</span>`:""}
          <div class="item-top">
            <div class="item-name">${esc(p.name)}</div>
            ${p.vegetarian?'<span class="item-veg" title="Vegetariano">🌿</span>':""}
          </div>
          ${p.description?`<div class="item-desc">${esc(p.description)}</div>`:""}
          <div class="item-foot">
            <span class="item-price">${esc(p.price||"")}</span>
            <span class="item-tag ${p.stock?"in":"out"}">${p.stock?"Disponible":"Agotado"}</span>
          </div>
        </div>
      </div>`;
    });
    html+="</div>";
  });
  if(!html)html='<div class="empty"><p>No hay productos disponibles<br/>en este momento.</p></div>';
  main.innerHTML=html;
}

loadAll();
setInterval(loadAll,60000);
</script>
</body>
</html>
