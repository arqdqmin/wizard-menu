<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talleres — Wizard Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Lora:wght@400;600&family=Pirata+One&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<link rel="stylesheet" href="/css/platform.css" />
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<style>
/* ── Tabs ──────────────────────────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab-btn{
  padding:10px 18px;font-size:13px;font-weight:500;
  color:var(--muted);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .14s,border-color .14s;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Grid de cards ─────────────────────────────────────────── */
.taller-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-top:16px}
.taller-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.taller-card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.taller-card-img{
  width:100%;aspect-ratio:4/3;
  background:var(--bg);display:flex;align-items:center;
  justify-content:center;color:var(--hint);font-size:32px;overflow:hidden;
}
.taller-card-img img{width:100%;height:100%;object-fit:contain;display:block}
.taller-card-body{padding:14px}
.taller-card-name{font-size:14px;font-weight:600;margin-bottom:4px}
.taller-card-fecha{font-size:12px;color:var(--muted);margin-bottom:6px}
.taller-card-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.taller-card-precio{font-size:13px;font-weight:600;color:var(--accent)}
.taller-card-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.taller-inactive{opacity:.5}

/* ── Page header ───────────────────────────────────────────── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:10px}

/* ── Inscripciones ─────────────────────────────────────────── */
.inscripcion-filter{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-select{height:36px;border:1px solid var(--border-strong);border-radius:var(--radius);padding:0 10px;font-family:inherit;font-size:13px;color:var(--text);background:var(--surface);outline:none}
.filter-select:focus{border-color:var(--accent)}

.stat-mini{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-mini-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px}
.stat-mini-value{font-size:22px;font-weight:700;color:var(--accent)}
.stat-mini-label{font-size:11px;color:var(--muted)}

/* ── Imagen upload ─────────────────────────────────────────── */
.img-upload-area{
  position:relative;width:100%;height:140px;
  border:2px dashed var(--border-strong);border-radius:10px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;gap:6px;
  color:var(--hint);font-size:13px;overflow:hidden;
  transition:border-color .15s;
}
.img-upload-area:hover{border-color:var(--accent)}
.img-upload-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:var(--bg)}
.img-overlay-label{position:relative;z-index:1;background:rgba(0,0,0,.5);color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;opacity:0;transition:opacity .15s}
.img-upload-area:hover .img-overlay-label{opacity:1}
.img-upload-input{display:none}

/* ── Form internals ────────────────────────────────────────── */
.form-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-row2{grid-template-columns:1fr}}

/* ── Preset select row ─────────────────────────────────────── */
.preset-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.preset-select{flex:1;height:36px;border:1px solid var(--border-strong);border-radius:var(--radius);padding:0 10px;font-family:inherit;font-size:13px;color:var(--text);background:var(--surface2);outline:none}
.preset-select:focus{border-color:var(--accent)}
.preset-fields{border:1px solid var(--border);border-radius:var(--radius);padding:14px;background:var(--surface2);margin-bottom:4px}
.preset-fields.hidden{display:none}

/* ── Presets list (tab Datos Bancarios) ────────────────────── */
.presets-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.preset-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
}
.preset-card:hover{border-color:var(--accent)}
.preset-card-info{flex:1;min-width:0}
.preset-card-name{font-size:14px;font-weight:600;margin-bottom:4px}
.preset-card-tipo{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.preset-tipo-banco{background:rgba(59,130,246,.12);color:#60a5fa}
.preset-tipo-link{background:rgba(167,139,250,.12);color:#a78bfa}
.preset-card-detail{font-size:12px;color:var(--muted);line-height:1.6}
.preset-card-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Drag & drop ───────────────────────────────────────────── */
.drag-handle{
  position:absolute;top:8px;left:8px;z-index:2;
  width:24px;height:24px;border-radius:6px;
  background:rgba(0,0,0,.45);color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:grab;opacity:0;transition:opacity .15s;
}
.taller-card:hover .drag-handle{opacity:1}
.taller-card.dragging{opacity:.4;border-style:dashed}
.taller-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.taller-card{position:relative}

/* ── Multi fecha ───────────────────────────────────────────── */
.multi-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;letter-spacing:.04em;
  background:rgba(167,139,250,.15);color:#a78bfa;
  border-radius:8px;padding:2px 7px;margin-left:6px;vertical-align:middle;
}
.toggle-row{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:13px;color:var(--text);cursor:pointer}
.toggle-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}

/* ── Fechas list editor ────────────────────────────────────── */
.fechas-list{display:flex;flex-direction:column;gap:8px;margin:8px 0}
.fecha-row{
  display:grid;grid-template-columns:1fr auto auto auto;
  gap:8px;align-items:center;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;
}
.fecha-row input{background:transparent;border:none;border-bottom:1px solid var(--border);
  padding:4px 6px;font-family:inherit;font-size:13px;color:var(--text);outline:none;width:100%}
.fecha-row input:focus{border-bottom-color:var(--accent)}
.fecha-row-fields{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;flex:1}

/* ── Empty state ───────────────────────────────────────────── */
.empty-state{text-align:center;padding:40px;color:var(--hint);font-size:13px}
.empty-state i{font-size:32px;display:block;margin-bottom:10px;color:var(--border-strong)}

@keyframes spin{to{transform:rotate(360deg)}}

/* ── Quill overrides ───────────────────────────────────────── */
.ql-toolbar.ql-snow{
  border:1px solid var(--border-strong);
  border-bottom:none;
  border-radius:var(--radius) var(--radius) 0 0;
  background:var(--surface2);
  padding:6px 8px;
}
.ql-container.ql-snow{
  border:1px solid var(--border-strong);
  border-radius:0 0 var(--radius) var(--radius);
  background:var(--surface2);
  font-family:"DM Sans",sans-serif;
  font-size:13px;
  min-height:100px;
}
.ql-container.ql-snow:focus-within{border-color:var(--accent)}
.ql-editor{color:var(--text);min-height:100px;line-height:1.6}
.ql-editor.ql-blank::before{color:var(--hint);font-style:normal}
.ql-snow .ql-stroke{stroke:var(--muted)}
.ql-snow .ql-fill{fill:var(--muted)}
.ql-snow .ql-picker{color:var(--muted)}
.ql-snow .ql-picker-options{background:var(--surface2);border-color:var(--border)}
.ql-snow.ql-toolbar button:hover .ql-stroke,
.ql-snow.ql-toolbar button.ql-active .ql-stroke{stroke:var(--accent)}
.ql-snow.ql-toolbar button:hover .ql-fill,
.ql-snow.ql-toolbar button.ql-active .ql-fill{fill:var(--accent)}
.ql-snow.ql-toolbar button:hover,
.ql-snow.ql-toolbar button.ql-active{color:var(--accent)}
</style>
</head>
<body>
<div id="platform-shell"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { requireAuth }   from '/js/core/auth.js';
import { initShell }     from '/js/ui/sidebar.js';
import { supabase, SUPABASE_URL, SUPABASE_ANON_KEY } from '/js/core/supabase.js';
import { getAccessToken } from '/js/core/auth.js';

const user = await requireAuth('/platform/login.html');
if (!user) throw new Error('No auth');
await initShell('talleres', 'Talleres');

const content   = document.getElementById('platform-content');
const BUCKET    = 'images';
let talleres    = [];
let presets     = [];
let editingId   = null;
let editPresetId= null;
let authToken   = await getAccessToken();
let toastTimer;

// ── Utilidades ────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function openModal(id)  { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }
window.closeModal = closeModal;

// ── Upload imagen ─────────────────────────────────────────────
async function uploadImagen(file) {
  const ext  = file.name.split('.').pop();
  const path = `talleres/taller_${Date.now()}.${ext}`;
  const res  = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method: 'POST',
    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${authToken}`,
               'Content-Type': file.type, 'cache-control': 'max-age=31536000', 'x-upsert': 'true' },
    body: file,
  });
  if (!res.ok) throw new Error('Error al subir imagen');
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

// ── Cargar datos ──────────────────────────────────────────────
async function loadTalleres() {
  const { data, error } = await supabase
    .from('talleres')
    .select('*, taller_fechas(id,nombre,fecha,hora,orden)')
    .order('orden', { ascending: true })
    .order('fecha', { ascending: true });
  if (error) { toast('Error al cargar talleres'); return; }
  talleres = (data ?? []).map(t => ({
    ...t,
    taller_fechas: (t.taller_fechas ?? []).sort((a,b) => a.orden - b.orden),
  }));
}

async function loadPresets() {
  const { data, error } = await supabase.from('pago_presets').select('*').order('nombre');
  if (error) { toast('Error al cargar presets'); return; }
  presets = data ?? [];
}

// ── Render Talleres ───────────────────────────────────────────
function renderTalleres() {
  const grid = document.getElementById('taller-grid');
  if (!talleres.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-school"></i>Aún no hay talleres. Crea el primero.</div>`;
    return;
  }
  grid.innerHTML = talleres.map(t => {
    const precio = t.precio ? `$${t.precio.toLocaleString('es-CL')}` : 'Sin costo';
    let fechaLabel;
    if (t.multi_fecha && t.taller_fechas?.length) {
      fechaLabel = `${t.taller_fechas.length} fechas disponibles`;
    } else if (t.fecha) {
      fechaLabel = new Date(t.fecha+'T12:00:00').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short',year:'numeric'})
        + (t.hora ? ' · '+t.hora.slice(0,5)+'h' : '');
    } else { fechaLabel = 'Sin fecha'; }
    return `<div class="taller-card${t.activo?'':' taller-inactive'}" draggable="true" data-id="${t.id}">
      <div class="drag-handle" title="Arrastrar para reordenar"><i class="ti ti-grip-vertical"></i></div>
      <div class="taller-card-img">
        ${t.imagen_url?`<img src="${esc(t.imagen_url)}" alt="${esc(t.nombre)}" loading="lazy"/>`:`<i class="ti ti-school"></i>`}
      </div>
      <div class="taller-card-body">
        <div class="taller-card-name">
          ${esc(t.nombre)}
          ${t.multi_fecha?`<span class="multi-badge"><i class="ti ti-calendar-repeat"></i> Multi-fecha</span>`:''}
        </div>
        <div class="taller-card-fecha"><i class="ti ti-calendar-event" style="margin-right:3px"></i>${fechaLabel}</div>
        <div class="taller-card-desc">${esc((t.descripcion??'').replace(/<[^>]*>/g,''))}</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="taller-card-precio">${precio}</span>
          <span style="font-size:11px;color:var(--muted)">
            ${t.cupos?t.cupos+' cupos':''}
            ${t.edad_min?(t.cupos?' · ':'')+(t.edad_max?t.edad_min+'–'+t.edad_max+' años':'Desde '+t.edad_min+' años'):''}
          </span>
        </div>
        <div class="taller-card-actions">
          <button class="btn btn-sm" onclick="openEdit(${t.id})"><i class="ti ti-pencil"></i> Editar</button>
          <button class="btn btn-sm" onclick="toggleActivo(${t.id})">
            <i class="ti ti-${t.activo?'eye-off':'eye'}"></i> ${t.activo?'Ocultar':'Mostrar'}
          </button>
          <button class="btn btn-sm btn-icon danger" onclick="deleteTaller(${t.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Drag & drop
  let dragSrcId = null;
  grid.querySelectorAll('.taller-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', () => { dragSrcId = parseInt(card.dataset.id); card.classList.add('dragging'); });
    card.addEventListener('dragend',   () => card.classList.remove('dragging'));
    card.addEventListener('dragover',  e => { e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', async e => {
      e.preventDefault(); card.classList.remove('drag-over');
      const targetId = parseInt(card.dataset.id);
      if (dragSrcId === targetId) return;
      const si = talleres.findIndex(t => t.id === dragSrcId);
      const ti = talleres.findIndex(t => t.id === targetId);
      talleres.splice(ti, 0, talleres.splice(si, 1)[0]);
      renderTalleres();
      await saveOrden();
    });
  });
}

async function saveOrden() {
  await Promise.all(talleres.map((t, i) =>
    supabase.from('talleres').update({ orden: i }).eq('id', t.id)
  ));
}

// ── Modal taller — abrir ──────────────────────────────────────
window.openCreate = function() {
  editingId = null;
  resetTallerForm();
  document.getElementById('modal-t-title').textContent = 'Nuevo taller';
  fillPresetSelects();
  openModal('modal-taller');
  setTimeout(() => initQuill(), 50);
};

window.openEdit = function(id) {
  editingId = id;
  const t = talleres.find(x => x.id === id);
  if (!t) return;
  document.getElementById('t-nombre').value   = t.nombre ?? '';
  document.getElementById('t-fecha').value    = t.fecha ?? '';
  document.getElementById('t-hora').value     = t.hora?.slice(0,5) ?? '';
  document.getElementById('t-precio').value   = t.precio ?? '';
  document.getElementById('t-cupos').value    = t.cupos ?? '';
  document.getElementById('t-edad-min').value = t.edad_min ?? '';
  document.getElementById('t-edad-max').value = t.edad_max ?? '';
  // Multi-fecha
  const isMulti = !!t.multi_fecha;
  document.getElementById('t-multi-fecha').checked = isMulti;
  toggleMultiFecha(isMulti);
  if (isMulti) {
    renderFechasEditor(t.taller_fechas ?? []);
  } else {
    document.getElementById('t-fecha').value = t.fecha ?? '';
    document.getElementById('t-hora').value  = t.hora?.slice(0,5) ?? '';
  }
  document.getElementById('t-link').value     = t.link_pago ?? '';
  document.getElementById('t-banco').value    = t.banco ?? '';
  document.getElementById('t-tipo').value     = t.tipo_cuenta ?? '';
  document.getElementById('t-cuenta').value   = t.num_cuenta ?? '';
  document.getElementById('t-titular').value  = t.titular ?? '';
  document.getElementById('t-rut').value      = t.rut_titular ?? '';
  document.getElementById('t-email').value    = t.email_titular ?? '';
  if (t.banco || t.num_cuenta) showTransferFields(true);
  if (t.link_pago) showLinkFields(true);
  const prev = document.getElementById('img-preview');
  if (t.imagen_url) { prev.src = t.imagen_url; prev.style.display = 'block'; }
  else               { prev.style.display = 'none'; }
  fillPresetSelects();
  document.getElementById('modal-t-title').textContent = 'Editar taller';
  openModal('modal-taller');
  setTimeout(() => { initQuill(); quillDesc.root.innerHTML = t.descripcion ?? ''; }, 50);
};

function resetTallerForm() {
  ['t-nombre','t-fecha','t-hora','t-precio','t-cupos','t-edad-min','t-edad-max',
   't-link','t-banco','t-tipo','t-cuenta','t-titular','t-rut','t-email'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  if (quillDesc) quillDesc.root.innerHTML = '';
  document.getElementById('t-multi-fecha').checked = false;
  toggleMultiFecha(false);
  renderFechasEditor([]);
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('t-img-input').value = '';
  window._pendingImg = null;
  showTransferFields(false);
  showLinkFields(false);
}

function fillPresetSelects() {
  // Select de presets de transferencia
  const selT = document.getElementById('sel-preset-transfer');
  selT.innerHTML = `<option value="">— Seleccionar cuenta guardada —</option>` +
    presets.filter(p => p.tipo === 'transferencia')
      .map(p => `<option value="${p.id}">${esc(p.nombre)}</option>`).join('');

  // Select de presets de link
  const selL = document.getElementById('sel-preset-link');
  selL.innerHTML = `<option value="">— Seleccionar link guardado —</option>` +
    presets.filter(p => p.tipo === 'link')
      .map(p => `<option value="${p.id}">${esc(p.nombre)}</option>`).join('');
}

function showTransferFields(show) {
  document.getElementById('transfer-fields').classList.toggle('hidden', !show);
}
function showLinkFields(show) {
  document.getElementById('link-fields').classList.toggle('hidden', !show);
}
window.showTransferFields = showTransferFields;
window.showLinkFields = showLinkFields;

// ── Guardar taller ────────────────────────────────────────────
async function saveTaller() {
  const nombre = document.getElementById('t-nombre').value.trim();
  if (!nombre) { toast('El nombre es obligatorio.'); return; }

  const btn = document.getElementById('btn-save-taller');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Guardando…';

  let imagen_url = editingId ? talleres.find(t => t.id === editingId)?.imagen_url : null;
  if (window._pendingImg) {
    try { imagen_url = await uploadImagen(window._pendingImg); }
    catch { toast('Error al subir imagen'); btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Guardar'; return; }
  }

  const body = {
    nombre,
    descripcion:   quillDesc ? quillDesc.root.innerHTML.replace(/<p><br><\/p>/g,'').trim() || null : null,
    precio:        parseInt(document.getElementById('t-precio').value) || null,
    cupos:         parseInt(document.getElementById('t-cupos').value) || null,
    edad_min:      parseInt(document.getElementById('t-edad-min').value) || null,
    edad_max:      parseInt(document.getElementById('t-edad-max').value) || null,
    multi_fecha:   document.getElementById('t-multi-fecha').checked,
    fecha:         document.getElementById('t-multi-fecha').checked ? null : (document.getElementById('t-fecha').value || null),
    hora:          document.getElementById('t-multi-fecha').checked ? null : (document.getElementById('t-hora').value || null),
    link_pago:     document.getElementById('t-link').value.trim() || null,
    banco:         document.getElementById('t-banco').value.trim() || null,
    tipo_cuenta:   document.getElementById('t-tipo').value.trim() || null,
    num_cuenta:    document.getElementById('t-cuenta').value.trim() || null,
    titular:       document.getElementById('t-titular').value.trim() || null,
    rut_titular:   document.getElementById('t-rut').value.trim() || null,
    email_titular: document.getElementById('t-email').value.trim() || null,
    imagen_url,
  };

  let error;
  if (editingId) {
    ({ error } = await supabase.from('talleres').update(body).eq('id', editingId));
  } else {
    ({ error } = await supabase.from('talleres').insert({ ...body, activo: true }));
  }

  if (error) { toast('Error: ' + error.message); btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Guardar'; return; }

  // Guardar fechas si es multi-fecha
  const tallerId = editingId || (await supabase.from('talleres').select('id').order('created_at',{ascending:false}).limit(1).single()).data?.id;
  if (document.getElementById('t-multi-fecha').checked) {
    await supabase.from('taller_fechas').delete().eq('taller_id', tallerId);
    const rows = getFechasEditorRows();
    if (rows.length) {
      await supabase.from('taller_fechas').insert(rows.map((r,i) => ({
        taller_id: tallerId, nombre: r.nombre||null, fecha: r.fecha||null, hora: r.hora||null, orden: i,
      })));
    }
  } else {
    await supabase.from('taller_fechas').delete().eq('taller_id', tallerId);
  }

  toast(editingId ? 'Taller actualizado ✓' : 'Taller creado ✓');
  closeModal('modal-taller');
  window._pendingImg = null;
  await loadTalleres();
  renderTalleres();
  renderInscripcionesFilter();
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Guardar';
}

function toggleMultiFecha(on) {
  document.getElementById('single-fecha-block').style.display = on ? 'none' : 'block';
  document.getElementById('multi-fecha-block').style.display  = on ? 'block' : 'none';
}
window.toggleMultiFecha = toggleMultiFecha;

function renderFechasEditor(fechas) {
  const list = document.getElementById('fechas-list');

  if (!fechas.length) { list.innerHTML = ''; addFechaRow(); return; }
  list.innerHTML = '';
  fechas.forEach(f => addFechaRow(f));

window.addFechaRow = function(data) {
  const list = document.getElementById('fechas-list');
  if (!list) return;
  const idx = list.children.length;
  const div = document.createElement('div');
  div.className = 'fecha-row';
  div.innerHTML = `
    <input type="text"  class="fr-nombre" placeholder="Etiqueta opcional (ej: Turno tarde)" value="${esc(data?.nombre??'')}" />
    <input type="date"  class="fr-fecha"  value="${data?.fecha??''}" />
    <input type="time"  class="fr-hora"   value="${data?.hora?.slice(0,5)??''}" />

function getFechasEditorRows() {
  return Array.from(document.querySelectorAll('#fechas-list .fecha-row')).map(row => ({

    fecha:  row.querySelector('.fr-fecha').value,
    hora:   row.querySelector('.fr-hora').value,

window.toggleActivo = async function(id) {
  const t = talleres.find(x => x.id === id);
  if (!t) return;
  const { error } = await supabase.from('talleres').update({ activo: !t.activo }).eq('id', id);
  if (error) { toast('Error'); return; }
  t.activo = !t.activo;

  toast(t.activo ? 'Taller visible ✓' : 'Taller ocultado ✓');

window.deleteTaller = async function(id) {
  const t = talleres.find(x => x.id === id);
  if (!confirm(`¿Eliminar "${t?.nombre}"? También se eliminarán sus inscripciones.`)) return;
  const { error } = await supabase.from('talleres').delete().eq('id', id);
  if (error) { toast('Error al eliminar'); return; }

// ── Inscripciones ─────────────────────────────────────────────
let inscripciones = [];
let filterTallerId = 'all';

async function getAuthToken() {
  const { data: { session } } = await supabase.auth.getSession();
  return session?.access_token ?? '';
}

const INSC_FN = 'https://cwatxpuxttgeceahbciw.supabase.co/functions/v1/inscripciones';

async function loadInscripciones() {
  const token = await getAuthToken();
  const params = new URLSearchParams();
  if (filterTallerId !== 'all') params.set('taller_id', filterTallerId);
  const res = await fetch(`${INSC_FN}?${params}`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!res.ok) { toast('Error al cargar inscripciones'); return; }
  inscripciones = await res.json();
}

function renderInscripcionesFilter() {
  const sel = document.getElementById('filter-taller');
  if (!sel) return;
  const val = sel.value;
  sel.innerHTML = `<option value="all">Todos los talleres</option>` +
    talleres.map(t => `<option value="${t.id}" ${String(t.id)===String(val)?'selected':''}>${esc(t.nombre)}</option>`).join('');
}

function renderInscripcionesTable() {
  document.getElementById('stat-inscritos').textContent = inscripciones.length;
  const tbody = document.getElementById('inscripciones-tbody');
  if (!inscripciones.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="ti ti-users"></i>Sin inscripciones.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = inscripciones.map(ins => {
    const dt = new Date(ins.created_at).toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'});
    return `<tr>
      <td style="font-size:12px;color:var(--muted)">${dt}</td>
      <td style="font-weight:500">${esc(ins.talleres?.nombre??'—')}</td>
      <td style="font-size:12px;color:var(--muted)">${esc(ins.fecha_elegida??'—')}</td>
      <td>${esc(ins.nombre)}</td>
      <td>${ins.edad??'—'}</td>
      <td>${esc(ins.nombre_apoderado??'—')}</td>
      <td>${esc(ins.telefono??'—')}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-sm btn-icon" onclick="openEditInscripcion(${ins.id})" title="Editar"><i class="ti ti-pencil"></i></button>
        <button class="btn btn-sm btn-icon danger" onclick="deleteInscripcion(${ins.id},'${esc(ins.nombre)}')" title="Eliminar"><i class="ti ti-trash"></i></button>
      </td>
    </tr>`;
  }).join('');
}

async function renderInscripciones() {
  await loadInscripciones();
  renderInscripcionesTable();
}

window.openEditInscripcion = function(id) {
  const ins = inscripciones.find(x => x.id === id);
  if (!ins) return;
  document.getElementById('ei-id').value             = ins.id;
  document.getElementById('ei-nombre').value         = ins.nombre ?? '';
  document.getElementById('ei-edad').value           = ins.edad ?? '';
  document.getElementById('ei-apoderado').value      = ins.nombre_apoderado ?? '';
  document.getElementById('ei-telefono').value       = ins.telefono ?? '';
  document.getElementById('ei-fecha').value          = ins.fecha_elegida ?? '';
  // Poblar select de taller
  const sel = document.getElementById('ei-taller');
  sel.innerHTML = talleres.map(t => `<option value="${t.id}" ${String(t.id) === String(ins.taller_id) ? 'selected' : ''}>${esc(t.nombre)}</option>`).join('');
  openModal('modal-edit-inscripcion');
};

window.saveEditInscripcion = async function() {
  const id    = parseInt(document.getElementById('ei-id').value);
  const nombre = document.getElementById('ei-nombre').value.trim();
  if (!nombre) { toast('El nombre es obligatorio.'); return; }
  const body = {
    taller_id:        parseInt(document.getElementById('ei-taller').value),
    nombre,
    edad:             parseInt(document.getElementById('ei-edad').value) || null,
    nombre_apoderado: document.getElementById('ei-apoderado').value.trim() || null,
    telefono:         document.getElementById('ei-telefono').value.trim() || null,
    fecha_elegida:    document.getElementById('ei-fecha').value || null,
  };
  const btn = document.getElementById('btn-save-edit-ins');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Guardando…';
  const { error, count } = await supabase.from('taller_inscripciones').update(body).eq('id', id);
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Guardar';
  if (error) { toast('Error al guardar: ' + error.message); return; }
  // Actualizar array local para que el render refleje el cambio inmediatamente
  const idx = inscripciones.findIndex(x => x.id === id);
  if (idx !== -1) {
    const taller = talleres.find(t => String(t.id) === String(body.taller_id));
    inscripciones[idx] = { ...inscripciones[idx], ...body, talleres: taller ? { nombre: taller.nombre } : inscripciones[idx].talleres };
  }
  toast('Inscripción actualizada ✓');
  closeModal('modal-edit-inscripcion');
  renderInscripcionesTable();
};

window.deleteInscripcion = async function(id, nombre) {
  if (!confirm(`¿Eliminar la inscripción de "${nombre}"?`)) return;
  const token = await getAuthToken();
  const res = await fetch(`${INSC_FN}?id=${id}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!res.ok) { toast('Error al eliminar'); return; }
  inscripciones = inscripciones.filter(x => x.id !== id);
  document.getElementById('stat-inscritos').textContent = inscripciones.length;
  await renderInscripciones();
  toast('Inscripción eliminada');
};

function exportExcel() {
  if (!inscripciones.length) { toast('No hay inscripciones para exportar.'); return; }
  const rows = inscripciones.map(ins => ({
    'Taller': ins.talleres?.nombre??'',
    'Nombre': ins.nombre, 'Edad': ins.edad??'',
    'Apoderado': ins.nombre_apoderado??'', 'Teléfono': ins.telefono??'',
    'Fecha inscripción': new Date(ins.created_at).toLocaleString('es-CL'),
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Inscripciones');
  XLSX.writeFile(wb, `inscripciones_talleres_${Date.now()}.xlsx`);
}
window.exportExcel = exportExcel;

}

  document.getElementById('modal-preset-title').textContent = tipo === 'transferencia' ? 'Nueva cuenta bancaria' : 'Nuevo link de pago';
  openModal('modal-preset');
};

window.openEditPreset = function(id) {
  editPresetId = id;
  const p = presets.find(x => x.id === id);
  if (!p) return;
  document.getElementById('p-nombre').value  = p.nombre ?? '';
  document.getElementById('preset-tipo-radio-' + p.tipo).checked = true;
  togglePresetTipo(p.tipo);
  if (p.tipo === 'transferencia') {
    document.getElementById('p-banco').value    = p.banco ?? '';
    document.getElementById('p-tipo').value     = p.tipo_cuenta ?? '';
    document.getElementById('p-cuenta').value   = p.num_cuenta ?? '';
    document.getElementById('p-titular').value  = p.titular ?? '';
    document.getElementById('p-rut').value      = p.rut_titular ?? '';
    document.getElementById('p-email').value    = p.email_titular ?? '';
  } else {
    document.getElementById('p-url').value  = p.url ?? '';
    document.getElementById('p-desc').value = p.descripcion ?? '';
  }
  document.getElementById('modal-preset-title').textContent = 'Editar preset';
  openModal('modal-preset');
};

function resetPresetForm() {
  ['p-nombre','p-banco','p-tipo','p-cuenta','p-titular','p-rut','p-email','p-url','p-desc'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
}

function togglePresetTipo(tipo) {
  document.getElementById('preset-fields-banco').classList.toggle('hidden', tipo !== 'transferencia');
  document.getElementById('preset-fields-link').classList.toggle('hidden', tipo !== 'link');
}
window.togglePresetTipo = togglePresetTipo;

async function savePreset() {
  const nombre = document.getElementById('p-nombre').value.trim();
  if (!nombre) { toast('El nombre del preset es obligatorio.'); return; }
  const tipo = document.querySelector('input[name="p-tipo"]:checked')?.value;
  if (!tipo) { toast('Selecciona un tipo.'); return; }

  const btn = document.getElementById('btn-save-preset');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Guardando…';

  const body = { nombre, tipo,
    banco:         tipo==='transferencia' ? document.getElementById('p-banco').value.trim()||null : null,
    tipo_cuenta:   tipo==='transferencia' ? document.getElementById('p-tipo').value.trim()||null : null,
    num_cuenta:    tipo==='transferencia' ? document.getElementById('p-cuenta').value.trim()||null : null,
    titular:       tipo==='transferencia' ? document.getElementById('p-titular').value.trim()||null : null,
    rut_titular:   tipo==='transferencia' ? document.getElementById('p-rut').value.trim()||null : null,
    email_titular: tipo==='transferencia' ? document.getElementById('p-email').value.trim()||null : null,
    url:           tipo==='link' ? document.getElementById('p-url').value.trim()||null : null,
    descripcion:   tipo==='link' ? document.getElementById('p-desc').value.trim()||null : null,
  };

  let error;
  if (editPresetId) {
    ({ error } = await supabase.from('pago_presets').update(body).eq('id', editPresetId));
  } else {
    ({ error } = await supabase.from('pago_presets').insert(body));
  }

  if (error) { toast('Error: ' + error.message); }
  else {
    toast(editPresetId ? 'Preset actualizado ✓' : 'Preset guardado ✓');
    closeModal('modal-preset');
    await loadPresets();
    renderPresets();
  }
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Guardar';
}

window.deletePreset = async function(id) {
  if (!confirm('¿Eliminar este preset?')) return;
  const { error } = await supabase.from('pago_presets').delete().eq('id', id);
  if (error) { toast('Error al eliminar'); return; }
  presets = presets.filter(x => x.id !== id);
  renderPresets();
  toast('Preset eliminado');
};

      <div class="preset-fields" id="link-fields">
        <div class="form-group">
          <label class="form-label">URL de pago (Webpay, Flow, Mercado Pago…)</label>
          <input class="form-input" id="t-link" placeholder="https://..." />
        </div>
      </div>
      <button class="btn btn-sm" style="margin-top:4px;margin-bottom:4px" onclick="showLinkFields(true)">
        <i class="ti ti-pencil"></i> Ingresar manualmente
      </button>

      <div class="form-section-title"><i class="ti ti-building-bank"></i> Datos de transferencia</div>
      <div class="preset-row">
        <select class="preset-select" id="sel-preset-transfer">
          <option value="">— Seleccionar cuenta guardada —</option>
        </select>
        <button class="btn btn-sm" onclick="applyTransferPreset()" title="Aplicar preset"><i class="ti ti-check"></i> Usar</button>
      </div>
      <div class="preset-fields hidden" id="transfer-fields">
        <div class="form-row2">
          <div class="form-group">
            <label class="form-label">Banco</label>
            <input class="form-input" id="t-banco" placeholder="Ej: Banco Estado" />
          </div>
          <div class="form-group">
            <label class="form-label">Tipo de cuenta</label>
            <input class="form-input" id="t-tipo" placeholder="Ej: Cuenta Rut" />
          </div>
        </div>
        <div class="form-row2" style="margin-top:10px">
          <div class="form-group">
            <label class="form-label">Número de cuenta</label>
            <input class="form-input" id="t-cuenta" placeholder="123456789" />
          </div>
          <div class="form-group">
            <label class="form-label">Titular</label>
            <input class="form-input" id="t-titular" placeholder="Nombre titular" />
          </div>
        </div>
        <div class="form-row2" style="margin-top:10px">
          <div class="form-group">
            <label class="form-label">RUT titular</label>
            <input class="form-input" id="t-rut" placeholder="12.345.678-9" />
          </div>
          <div class="form-group">
            <label class="form-label">Email titular</label>
            <input class="form-input" type="email" id="t-email" placeholder="correo@empresa.cl" />
          </div>
        </div>
      </div>
      <button class="btn btn-sm" style="margin-top:4px" onclick="showTransferFields(true)">
        <i class="ti ti-pencil"></i> Ingresar manualmente
      </button>

      <div class="modal-foot">
        <button class="btn" onclick="closeModal('modal-taller')">Cancelar</button>
        <button class="btn btn-accent" id="btn-save-taller"><i class="ti ti-check"></i> Guardar</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Editar inscripción ─────────────────────────── -->
  <div class="modal-backdrop" id="modal-edit-inscripcion">
    <div class="modal-box" style="width:460px">
      <div class="modal-title">Editar inscripción</div>
      <input type="hidden" id="ei-id" />
      <div class="form-group">
        <label class="form-label">Taller</label>
        <select class="form-input" id="ei-taller"></select>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label class="form-label">Nombre del asistente *</label>
        <input class="form-input" id="ei-nombre" placeholder="Nombre completo" />
      </div>
      <div class="form-row2" style="margin-top:10px">
        <div class="form-group">
          <label class="form-label">Edad</label>
          <input class="form-input" type="number" id="ei-edad" placeholder="—" min="1" max="99" />
        </div>
        <div class="form-group">
          <label class="form-label">Fecha elegida</label>
          <input class="form-input" id="ei-fecha" placeholder="Ej: Sábado 12 de julio" />
        </div>
      </div>
      <div class="form-row2" style="margin-top:10px">
        <div class="form-group">
          <label class="form-label">Nombre apoderado</label>
          <input class="form-input" id="ei-apoderado" placeholder="—" />
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono</label>
          <input class="form-input" id="ei-telefono" placeholder="+56 9 …" />
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal('modal-edit-inscripcion')">Cancelar</button>
        <button class="btn btn-accent" id="btn-save-edit-ins" onclick="saveEditInscripcion()"><i class="ti ti-check"></i> Guardar</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Crear / Editar preset ───────────────────────── -->
  <div class="modal-backdrop" id="modal-preset">
    <div class="modal-box" style="width:460px">
      <div class="modal-title" id="modal-preset-title">Nuevo preset</div>

      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Nombre del preset *</label>
        <input class="form-input" id="p-nombre" placeholder="Ej: Cuenta principal, Flow talleres…" />
      </div>

      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Tipo</label>
        <div style="display:flex;gap:16px;margin-top:6px">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="radio" name="p-tipo" id="preset-tipo-radio-transferencia" value="transferencia" onchange="togglePresetTipo('transferencia')" /> Transferencia bancaria
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="radio" name="p-tipo" id="preset-tipo-radio-link" value="link" onchange="togglePresetTipo('link')" /> Link de pago
          </label>
        </div>
      </div>

      <!-- Campos banco -->
      <div id="preset-fields-banco" class="hidden">
        <div class="form-row2">
          <div class="form-group">
            <label class="form-label">Banco</label>
            <input class="form-input" id="p-banco" placeholder="Ej: Banco Estado" />
          </div>
          <div class="form-group">
            <label class="form-label">Tipo de cuenta</label>
            <input class="form-input" id="p-tipo" placeholder="Ej: Cuenta Rut" />
          </div>
        </div>
        <div class="form-row2" style="margin-top:10px">
          <div class="form-group">
            <label class="form-label">Número de cuenta</label>
            <input class="form-input" id="p-cuenta" placeholder="123456789" />
          </div>
          <div class="form-group">
            <label class="form-label">Titular</label>
            <input class="form-input" id="p-titular" placeholder="Nombre titular" />
          </div>
        </div>
        <div class="form-row2" style="margin-top:10px">
          <div class="form-group">
            <label class="form-label">RUT</label>
            <input class="form-input" id="p-rut" placeholder="12.345.678-9" />
          </div>
          <div class="form-group">
            <label class="form-label">Email titular</label>
            <input class="form-input" type="email" id="p-email" placeholder="correo@empresa.cl" />
          </div>
        </div>
      </div>

      <!-- Campos link -->
      <div id="preset-fields-link" class="hidden">
        <div class="form-group">
          <label class="form-label">URL de pago *</label>
          <input class="form-input" id="p-url" placeholder="https://..." />
        </div>
        <div class="form-group" style="margin-top:10px">
          <label class="form-label">Descripción (opcional)</label>
          <input class="form-input" id="p-desc" placeholder="Ej: Flow, Webpay Plus…" />
        </div>
      </div>

      <div class="modal-foot">
        <button class="btn" onclick="closeModal('modal-preset')">Cancelar</button>
        <button class="btn btn-accent" id="btn-save-preset"><i class="ti ti-check"></i> Guardar</button>
      </div>
    </div>
  </div>
`;

// ── Aplicar presets al form del taller ───────────────────────
window.applyTransferPreset = function() {
  const id = parseInt(document.getElementById('sel-preset-transfer').value);
  if (!id) return;
  const p = presets.find(x => x.id === id);
  if (!p) return;
  document.getElementById('t-banco').value   = p.banco ?? '';
  document.getElementById('t-tipo').value    = p.tipo_cuenta ?? '';
  document.getElementById('t-cuenta').value  = p.num_cuenta ?? '';
  document.getElementById('t-titular').value = p.titular ?? '';
  document.getElementById('t-rut').value     = p.rut_titular ?? '';
  document.getElementById('t-email').value   = p.email_titular ?? '';
  showTransferFields(true);
  toast(`Cuenta "${p.nombre}" aplicada`);
};

window.applyLinkPreset = function() {
  const id = parseInt(document.getElementById('sel-preset-link').value);
  if (!id) return;
  const p = presets.find(x => x.id === id);
  if (!p) return;
  document.getElementById('t-link').value = p.url ?? '';
  showLinkFields(true);
  toast(`Link "${p.nombre}" aplicado`);
};

// ── Inicializar Quill ─────────────────────────────────────────
let quillDesc;
function initQuill() {
  if (quillDesc) return;
  quillDesc = new Quill('#t-desc-editor', {
    theme: 'snow',
    placeholder: 'Qué incluye el taller, para quién es, qué deben traer…',
    modules: {
      toolbar: [
        ['bold', 'italic', 'underline'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        [{ size: ['small', false, 'large'] }],
        ['clean'],
      ],
    },
  });
}

// ── Eventos ───────────────────────────────────────────────────
content.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    content.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    content.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    if (btn.dataset.tab === 'inscripciones') { renderInscripcionesFilter(); renderInscripciones(); }
    if (btn.dataset.tab === 'bancarios')     { renderPresets(); }
  });
});

document.getElementById('btn-save-taller').addEventListener('click', saveTaller);
document.getElementById('btn-save-preset').addEventListener('click', savePreset);
document.getElementById('btn-filtrar').addEventListener('click', async () => {
  filterTallerId = document.getElementById('filter-taller').value;
  await renderInscripciones();
});

// Imagen upload
const imgInput = document.getElementById('t-img-input');
document.getElementById('img-upload-area').addEventListener('click', () => imgInput.click());
imgInput.addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  window._pendingImg = file;
  const prev = document.getElementById('img-preview');
  prev.src = URL.createObjectURL(file); prev.style.display = 'block';
});

document.querySelectorAll('.modal-backdrop').forEach(m =>
  m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); })
);

// ── Init ──────────────────────────────────────────────────────
await loadPresets();
await loadTalleres();
renderTalleres();
</script>
</body>
</html>
