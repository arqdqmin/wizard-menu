<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talleres — Wizard Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Lora:wght@400;600&family=Pirata+One&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<link rel="stylesheet" href="/css/platform.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── Tabs ──────────────────────────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab-btn{
  padding:10px 18px;font-size:13px;font-weight:500;
  color:var(--muted);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .14s,border-color .14s;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Grid de cards ─────────────────────────────────────────── */
.taller-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-top:16px}
.taller-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.taller-card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.taller-card-img{
  width:100%;aspect-ratio:4/3;
  background:var(--bg);display:flex;align-items:center;
  justify-content:center;color:var(--hint);font-size:32px;overflow:hidden;
}
.taller-card-img img{width:100%;height:100%;object-fit:contain;display:block}
.taller-card-body{padding:14px}
.taller-card-name{font-size:14px;font-weight:600;margin-bottom:4px}
.taller-card-fecha{font-size:12px;color:var(--muted);margin-bottom:6px}
.taller-card-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.taller-card-precio{font-size:13px;font-weight:600;color:var(--accent)}
.taller-card-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.taller-inactive{opacity:.5}

/* ── Page header ───────────────────────────────────────────── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:10px}

/* ── Inscripciones ─────────────────────────────────────────── */
.inscripcion-filter{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-select{height:36px;border:1px solid var(--border-strong);border-radius:var(--radius);padding:0 10px;font-family:inherit;font-size:13px;color:var(--text);background:var(--surface);outline:none}
.filter-select:focus{border-color:var(--accent)}

.stat-mini{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-mini-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px}
.stat-mini-value{font-size:22px;font-weight:700;color:var(--accent)}
.stat-mini-label{font-size:11px;color:var(--muted)}

/* ── Imagen upload ─────────────────────────────────────────── */
.img-upload-area{
  position:relative;width:100%;height:140px;
  border:2px dashed var(--border-strong);border-radius:10px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;gap:6px;
  color:var(--hint);font-size:13px;overflow:hidden;
  transition:border-color .15s;
}
.img-upload-area:hover{border-color:var(--accent)}
.img-upload-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:var(--bg)}
.img-overlay-label{position:relative;z-index:1;background:rgba(0,0,0,.5);color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;opacity:0;transition:opacity .15s}
.img-upload-area:hover .img-overlay-label{opacity:1}
.img-upload-input{display:none}

/* ── Form internals ────────────────────────────────────────── */
.form-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-row2{grid-template-columns:1fr}}

/* ── Preset select row ─────────────────────────────────────── */
.preset-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.preset-select{flex:1;height:36px;border:1px solid var(--border-strong);border-radius:var(--radius);padding:0 10px;font-family:inherit;font-size:13px;color:var(--text);background:var(--surface2);outline:none}
.preset-select:focus{border-color:var(--accent)}
.preset-fields{border:1px solid var(--border);border-radius:var(--radius);padding:14px;background:var(--surface2);margin-bottom:4px}
.preset-fields.hidden{display:none}

/* ── Presets list (tab Datos Bancarios) ────────────────────── */
.presets-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.preset-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
}
.preset-card:hover{border-color:var(--accent)}
.preset-card-info{flex:1;min-width:0}
.preset-card-name{font-size:14px;font-weight:600;margin-bottom:4px}
.preset-card-tipo{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.preset-tipo-banco{background:rgba(59,130,246,.12);color:#60a5fa}
.preset-tipo-link{background:rgba(167,139,250,.12);color:#a78bfa}
.preset-card-detail{font-size:12px;color:var(--muted);line-height:1.6}
.preset-card-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Empty state ───────────────────────────────────────────── */
.empty-state{text-align:center;padding:40px;color:var(--hint);font-size:13px}
.empty-state i{font-size:32px;display:block;margin-bottom:10px;color:var(--border-strong)}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="platform-shell"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { requireAuth }   from '/js/core/auth.js';
import { initShell }     from '/js/ui/sidebar.js';
import { supabase, SUPABASE_URL, SUPABASE_ANON_KEY } from '/js/core/supabase.js';
import { getAccessToken } from '/js/core/auth.js';

const user = await requireAuth('/platform/login.html');
if (!user) throw new Error('No auth');
await initShell('talleres', 'Talleres');

const content   = document.getElementById('platform-content');
const BUCKET    = 'images';
let talleres    = [];
let presets     = [];
let editingId   = null;
let editPresetId= null;
let authToken   = await getAccessToken();
let toastTimer;

// ── Utilidades ────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function openModal(id)  { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }
window.closeModal = closeModal;

// ── Upload imagen ─────────────────────────────────────────────
async function uploadImagen(file) {
  const ext  = file.name.split('.').pop();
  const path = `talleres/taller_${Date.now()}.${ext}`;
  const res  = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method: 'POST',
    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${authToken}`,
               'Content-Type': file.type, 'cache-control': 'max-age=31536000', 'x-upsert': 'true' },
    body: file,
  });
  if (!res.ok) throw new Error('Error al subir imagen');
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

// ── Cargar datos ──────────────────────────────────────────────
async function loadTalleres() {
  const { data, error } = await supabase.from('talleres').select('*').order('fecha', { ascending: true });
  if (error) { toast('Error al cargar talleres'); return; }
  talleres = data ?? [];
}

async function loadPresets() {
  const { data, error } = await supabase.from('pago_presets').select('*').order('nombre');
  if (error) { toast('Error al cargar presets'); return; }
  presets = data ?? [];
}

// ── Render Talleres ───────────────────────────────────────────
function renderTalleres() {
  const grid = document.getElementById('taller-grid');
  if (!talleres.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-school"></i>Aún no hay talleres. Crea el primero.</div>`;
    return;
  }
  grid.innerHTML = talleres.map(t => {
    const fecha = t.fecha
      ? new Date(t.fecha+'T12:00:00').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short',year:'numeric'})
      : 'Sin fecha';
    const precio = t.precio ? `$${t.precio.toLocaleString('es-CL')}` : 'Sin costo';
    return `<div class="taller-card${t.activo?'':' taller-inactive'}">
      <div class="taller-card-img">
        ${t.imagen_url?`<img src="${esc(t.imagen_url)}" alt="${esc(t.nombre)}" loading="lazy"/>`:`<i class="ti ti-school"></i>`}
      </div>
      <div class="taller-card-body">
        <div class="taller-card-name">${esc(t.nombre)}</div>
        <div class="taller-card-fecha"><i class="ti ti-calendar-event" style="margin-right:3px"></i>${fecha}${t.hora?' · '+t.hora.slice(0,5)+'h':''}</div>
        <div class="taller-card-desc">${esc(t.descripcion??'')}</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="taller-card-precio">${precio}</span>
          ${t.cupos?`<span style="font-size:11px;color:var(--muted)">${t.cupos} cupos</span>`:''}
        </div>
        <div class="taller-card-actions">
          <button class="btn btn-sm" onclick="openEdit(${t.id})"><i class="ti ti-pencil"></i> Editar</button>
          <button class="btn btn-sm" onclick="toggleActivo(${t.id})" title="${t.activo?'Ocultar':'Mostrar'}">
            <i class="ti ti-${t.activo?'eye-off':'eye'}"></i> ${t.activo?'Ocultar':'Mostrar'}
          </button>
          <button class="btn btn-sm btn-icon danger" onclick="deleteTaller(${t.id})" title="Eliminar"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Modal taller — abrir ──────────────────────────────────────
window.openCreate = function() {
  editingId = null;
  resetTallerForm();
  document.getElementById('modal-t-title').textContent = 'Nuevo taller';
  fillPresetSelects();
  openModal('modal-taller');
};

window.openEdit = function(id) {
  editingId = id;
  const t = talleres.find(x => x.id === id);
  if (!t) return;
  document.getElementById('t-nombre').value  = t.nombre ?? '';
  document.getElementById('t-desc').value    = t.descripcion ?? '';
  document.getElementById('t-fecha').value   = t.fecha ?? '';
  document.getElementById('t-hora').value    = t.hora?.slice(0,5) ?? '';
  document.getElementById('t-precio').value  = t.precio ?? '';
  document.getElementById('t-cupos').value   = t.cupos ?? '';
  // Presets
  fillPresetSelects();
  // Link pago
  document.getElementById('t-link').value = t.link_pago ?? '';
  // Transferencia manual
  document.getElementById('t-banco').value    = t.banco ?? '';
  document.getElementById('t-tipo').value     = t.tipo_cuenta ?? '';
  document.getElementById('t-cuenta').value   = t.num_cuenta ?? '';
  document.getElementById('t-titular').value  = t.titular ?? '';
  document.getElementById('t-rut').value      = t.rut_titular ?? '';
  document.getElementById('t-email').value    = t.email_titular ?? '';
  // Mostrar fields si hay datos
  if (t.banco || t.num_cuenta) showTransferFields(true);
  if (t.link_pago) showLinkFields(true);
  // Imagen
  const prev = document.getElementById('img-preview');
  if (t.imagen_url) { prev.src = t.imagen_url; prev.style.display = 'block'; }
  else               { prev.style.display = 'none'; }
  document.getElementById('modal-t-title').textContent = 'Editar taller';
  openModal('modal-taller');
};

function resetTallerForm() {
  ['t-nombre','t-desc','t-fecha','t-hora','t-precio','t-cupos',
   't-link','t-banco','t-tipo','t-cuenta','t-titular','t-rut','t-email'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('t-img-input').value = '';
  window._pendingImg = null;
  showTransferFields(false);
  showLinkFields(false);
}

function fillPresetSelects() {
  // Select de presets de transferencia
  const selT = document.getElementById('sel-preset-transfer');
  selT.innerHTML = `<option value="">— Seleccionar cuenta guardada —</option>` +
    presets.filter(p => p.tipo === 'transferencia')
      .map(p => `<option value="${p.id}">${esc(p.nombre)}</option>`).join('');

  // Select de presets de link
  const selL = document.getElementById('sel-preset-link');
  selL.innerHTML = `<option value="">— Seleccionar link guardado —</option>` +
    presets.filter(p => p.tipo === 'link')
      .map(p => `<option value="${p.id}">${esc(p.nombre)}</option>`).join('');
}

function showTransferFields(show) {
  document.getElementById('transfer-fields').classList.toggle('hidden', !show);
}
function showLinkFields(show) {
  document.getElementById('link-fields').classList.toggle('hidden', !show);
}
window.showTransferFields = showTransferFields;
window.showLinkFields = showLinkFields;

// ── Guardar taller ────────────────────────────────────────────
async function saveTaller() {
  const nombre = document.getElementById('t-nombre').value.trim();
  if (!nombre) { toast('El nombre es obligatorio.'); return; }

  const btn = document.getElementById('btn-save-taller');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Guardando…';

  let imagen_url = editingId ? talleres.find(t => t.id === editingId)?.imagen_url : null;
  if (window._pendingImg) {
    try { imagen_url = await uploadImagen(window._pendingImg); }
    catch { toast('Error al subir imagen'); btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Guardar'; return; }
  }

  const body = {
    nombre,
    descripcion:   document.getElementById('t-desc').value.trim() || null,
    fecha:         document.getElementById('t-fecha').value || null,
    hora:          document.getElementById('t-hora').value || null,
    precio:        parseInt(document.getElementById('t-precio').value) || null,
    cupos:         parseInt(document.getElementById('t-cupos').value) || null,
    link_pago:     document.getElementById('t-link').value.trim() || null,
    banco:         document.getElementById('t-banco').value.trim() || null,
    tipo_cuenta:   document.getElementById('t-tipo').value.trim() || null,
    num_cuenta:    document.getElementById('t-cuenta').value.trim() || null,
    titular:       document.getElementById('t-titular').value.trim() || null,
    rut_titular:   document.getElementById('t-rut').value.trim() || null,
    email_titular: document.getElementById('t-email').value.trim() || null,
    imagen_url,
  };

  let error;
  if (editingId) {
    ({ error } = await supabase.from('talleres').update(body).eq('id', editingId));
  } else {
    ({ error } = await supabase.from('talleres').insert({ ...body, activo: true }));
  }

  if (error) { toast('Error: ' + error.message); }
  else {
    toast(editingId ? 'Taller actualizado ✓' : 'Taller creado ✓');
    closeModal('modal-taller');
    window._pendingImg = null;
    await loadTalleres();
    renderTalleres();
    renderInscripcionesFilter();
  }
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Guardar';
}

window.toggleActivo = async function(id) {
  const t = talleres.find(x => x.id === id);
  if (!t) return;
  const { error } = await supabase.from('talleres').update({ activo: !t.activo }).eq('id', id);
  if (error) { toast('Error'); return; }
  t.activo = !t.activo;
  renderTalleres();
  toast(t.activo ? 'Taller visible ✓' : 'Taller ocultado ✓');
};

window.deleteTaller = async function(id) {
  const t = talleres.find(x => x.id === id);
  if (!confirm(`¿Eliminar "${t?.nombre}"? También se eliminarán sus inscripciones.`)) return;
  const { error } = await supabase.from('talleres').delete().eq('id', id);
  if (error) { toast('Error al eliminar'); return; }
  talleres = talleres.filter(x => x.id !== id);
  renderTalleres(); renderInscripcionesFilter();
  toast('Taller eliminado');
};

// ── Inscripciones ─────────────────────────────────────────────
let inscripciones = [];
let filterTallerId = 'all';

async function loadInscripciones() {
  let q = supabase.from('taller_inscripciones').select('*, talleres(nombre)').order('created_at',{ascending:false});
  if (filterTallerId !== 'all') q = q.eq('taller_id', filterTallerId);
  const { data, error } = await q;
  if (error) { toast('Error al cargar inscripciones'); return; }
  inscripciones = data ?? [];
}

function renderInscripcionesFilter() {
  const sel = document.getElementById('filter-taller');
  if (!sel) return;
  const val = sel.value;
  sel.innerHTML = `<option value="all">Todos los talleres</option>` +
    talleres.map(t => `<option value="${t.id}" ${String(t.id)===String(val)?'selected':''}>${esc(t.nombre)}</option>`).join('');
}

async function renderInscripciones() {
  await loadInscripciones();
  document.getElementById('stat-inscritos').textContent = inscripciones.length;
  const tbody = document.getElementById('inscripciones-tbody');
  if (!inscripciones.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="ti ti-users"></i>Sin inscripciones.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = inscripciones.map(ins => {
    const dt = new Date(ins.created_at).toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'});
    return `<tr>
      <td style="font-size:12px;color:var(--muted)">${dt}</td>
      <td style="font-weight:500">${esc(ins.talleres?.nombre??'—')}</td>
      <td>${esc(ins.nombre)}</td>
      <td>${ins.edad??'—'}</td>
      <td>${esc(ins.nombre_apoderado??'—')}</td>
      <td>${esc(ins.telefono??'—')}</td>
    </tr>`;
  }).join('');
}

function exportExcel() {
  if (!inscripciones.length) { toast('No hay inscripciones para exportar.'); return; }
  const rows = inscripciones.map(ins => ({
    'Taller': ins.talleres?.nombre??'',
    'Nombre': ins.nombre, 'Edad': ins.edad??'',
    'Apoderado': ins.nombre_apoderado??'', 'Teléfono': ins.telefono??'',
    'Fecha inscripción': new Date(ins.created_at).toLocaleString('es-CL'),
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Inscripciones');
  XLSX.writeFile(wb, `inscripciones_talleres_${Date.now()}.xlsx`);
}
window.exportExcel = exportExcel;

// ── Presets CRUD ──────────────────────────────────────────────
function renderPresets() {
  const list = document.getElementById('presets-list');
  if (!presets.length) {
    list.innerHTML = `<div class="empty-state"><i class="ti ti-credit-card"></i>No hay presets guardados. Crea el primero.</div>`;
    return;
  }
  list.innerHTML = presets.map(p => {
    const esBanco = p.tipo === 'transferencia';
    const detalle = esBanco
      ? [p.banco, p.tipo_cuenta, p.num_cuenta, p.titular].filter(Boolean).join(' · ')
      : p.url ?? '';
    return `<div class="preset-card">
      <div class="preset-card-info">
        <div class="preset-card-name">${esc(p.nombre)}</div>
        <div class="preset-card-tipo ${esBanco?'preset-tipo-banco':'preset-tipo-link'}">
          <i class="ti ti-${esBanco?'building-bank':'link'}"></i>
          ${esBanco?'Transferencia':'Link de pago'}
        </div>
        <div class="preset-card-detail">${esc(detalle)}</div>
      </div>
      <div class="preset-card-actions">
        <button class="btn btn-sm" onclick="openEditPreset(${p.id})"><i class="ti ti-pencil"></i></button>
        <button class="btn btn-sm btn-icon danger" onclick="deletePreset(${p.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

window.openCreatePreset = function(tipo) {
  editPresetId = null;
  resetPresetForm();
  document.getElementById('preset-tipo-radio-' + tipo).checked = true;
  togglePresetTipo(tipo);
  document.getElementById('modal-preset-title').textContent = tipo === 'transferencia' ? 'Nueva cuenta bancaria' : 'Nuevo link de pago';
  openModal('modal-preset');
};

window.openEditPreset = function(id) {
  editPresetId = id;
  const p = presets.find(x => x.id === id);
  if (!p) return;
  document.getElementById('p-nombre').value  = p.nombre ?? '';
  document.getElementById('preset-tipo-radio-' + p.tipo).checked = true;
  togglePresetTipo(p.tipo);
  if (p.tipo === 'transferencia') {
    document.getElementById('p-banco').value    = p.banco ?? '';
    document.getElementById('p-tipo').value     = p.tipo_cuenta ?? '';
    document.getElementById('p-cuenta').value   = p.num_cuenta ?? '';
    document.getElementById('p-titular').value  = p.titular ?? '';
    document.getElementById('p-rut').value      = p.rut_titular ?? '';
    document.getElementById('p-email').value    = p.email_titular ?? '';
  } else {
    document.getElementById('p-url').value  = p.url ?? '';

  }
  document.getElementById('modal-preset-title').textContent = 'Editar preset';
  openModal('modal-preset');
};

function resetPresetForm() {
  ['p-nombre','p-banco','p-tipo','p-cuenta','p-titular','p-rut','p-email','p-url','p-desc'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
}

function togglePresetTipo(tipo) {
  document.getElementById('preset-fields-banco').classList.toggle('hidden', tipo !== 'transferencia');
  document.getElementById('preset-fields-link').classList.toggle('hidden', tipo !== 'link');
}

async function savePreset() {
  const nombre = document.getElementById('p-nombre').value.trim();
  if (!nombre) { toast('El nombre del preset es obligatorio.'); return; }
  const tipo = document.querySelector('input[name="p-tipo"]:checked')?.value;
  if (!tipo) { toast('Selecciona un tipo.'); return; }

  const btn = document.getElementById('btn-save-preset');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Guardando…';

  const body = { nombre, tipo,
    banco:         tipo==='transferencia' ? document.getElementById('p-banco').value.trim()||null : null,
    tipo_cuenta:   tipo==='transferencia' ? document.getElementById('p-tipo').value.trim()||null : null,
    num_cuenta:    tipo==='transferencia' ? document.getElementById('p-cuenta').value.trim()||null : null,
    titular:       tipo==='transferencia' ? document.getElementById('p-titular').value.trim()||null : null,
    rut_titular:   tipo==='transferencia' ? document.getElementById('p-rut').value.trim()||null : null,
    email_titular: tipo==='transferencia' ? document.getElementById('p-email').value.trim()||null : null,
    url:           tipo==='link' ? document.getElementById('p-url').value.trim()||null : null,
    descripcion:   tipo==='link' ? document.getElementById('p-desc').value.trim()||null : null,
  };

  let error;
  if (editPresetId) {
    ({ error } = await supabase.from('pago_presets').update(body).eq('id', editPresetId));
  } else {
    ({ error } = await supabase.from('pago_presets').insert(body));
  }

  if (error) { toast('Error: ' + error.message); }
  else {
    toast(editPresetId ? 'Preset actualizado ✓' : 'Preset guardado ✓');
    closeModal('modal-preset');
    await loadPresets();
    renderPresets();
  }
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Guardar';
}

window.deletePreset = async function(id) {
  if (!confirm('¿Eliminar este preset?')) return;
  const { error } = await supabase.from('pago_presets').delete().eq('id', id);
  if (error) { toast('Error al eliminar'); return; }
  presets = presets.filter(x => x.id !== id);
  renderPresets();
  toast('Preset eliminado');
};

// ── Aplicar presets al form del taller ───────────────────────
window.applyTransferPreset = function() {
  const id = parseInt(document.getElementById('sel-preset-transfer').value);
  if (!id) return;
  const p = presets.find(x => x.id === id);
  if (!p) return;
  document.getElementById('t-banco').value   = p.banco ?? '';
  document.getElementById('t-tipo').value    = p.tipo_cuenta ?? '';
  document.getElementById('t-cuenta').value  = p.num_cuenta ?? '';
  document.getElementById('t-titular').value = p.titular ?? '';
  document.getElementById('t-rut').value     = p.rut_titular ?? '';
  document.getElementById('t-email').value   = p.email_titular ?? '';
  showTransferFields(true);
  toast(`Cuenta "${p.nombre}" aplicada`);
};

window.applyLinkPreset = function() {
  const id = parseInt(document.getElementById('sel-preset-link').value);
  if (!id) return;
  const p = presets.find(x => x.id === id);
  if (!p) return;
  document.getElementById('t-link').value = p.url ?? '';
  showLinkFields(true);
  toast(`Link "${p.nombre}" aplicado`);
};

    if (btn.dataset.tab === 'inscripciones') { renderInscripcionesFilter(); renderInscripciones(); }
    if (btn.dataset.tab === 'bancarios')     { renderPresets(); }
  });
});
